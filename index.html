<!doctype html>
<html lang="uk">
<head>
<meta charset="utf-8" />
<title>Мозок Ресторану — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap">
<style>
  :root {
    --navy: #1A3A5C;
    --navy-2: #14304D;
    --navy-3: #0F263E;
    --navy-hi: #2B5481;
    --canvas: #F7F6F3;
    --card: #FFFFFF;
    --ink: #0E1B2C;
    --ink-2: #3A4A5F;
    --ink-3: #6B7A8F;
    --ink-4: #9AA6B8;
    --hairline: #E8E6DF;
    --hairline-2: #EFEDE6;
    --green: #2ECC71;
    --green-deep: #1FA85B;
    --green-soft: #E6F7EE;
    --red: #E8504C;
    --red-soft: #FCE9E8;
    --amber: #E9A23B;
    --amber-soft: #FCF1DF;
    --blue: #3D7FD1;
    --blue-soft: #E6EFFA;
    --violet: #7B61E3;
    --violet-soft: #EDEAFA;
  }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; background: var(--canvas); color: var(--ink); font-family: 'Inter', system-ui, sans-serif; font-size: 14px; -webkit-font-smoothing: antialiased; }
  button { font-family: inherit; }
  #root { height: 100vh; width: 100vw; overflow: hidden; }

  /* Scrollbars — thin, neutral */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: #D6D2C8; border-radius: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }

  @keyframes pulseDot {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.6); opacity: 0.35; }
  }
  @keyframes slideIn {
    from { transform: translateY(-8px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes typing {
    0%, 60%, 100% { transform: translateY(0); opacity: .4; }
    30% { transform: translateY(-3px); opacity: 1; }
  }
  @keyframes shimmer {
    0% { background-position: -400px 0; }
    100% { background-position: 400px 0; }
  }
  @keyframes barGrow {
    from { transform: scaleY(0); }
    to { transform: scaleY(1); }
  }
</style>
</head>
<body>
<div id="root"></div>

<script>
  // TWEAKS — edited in-place by host
  window.TWEAKS = /*EDITMODE-BEGIN*/{
    "density": "comfy",
    "accent": "green",
    "theme": "light",
    "feedSpeed": "normal"
  }/*EDITMODE-END*/;
</script>

<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="src/app.jsx"></script>
</body>
</html>
